<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandolin Wheel | عيدية ماندولين</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800&family=Amiri:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d6c4a8;
      --navy: #1a1e4d;
      --bg-light: #fdfbf9;
      --white: #ffffff;
      --accent-red: #d9534f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-light);
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .header-section { text-align: center; margin-bottom: 25px; }
    .brand-title { font-family: 'Amiri', serif; font-size: 3.5rem; color: var(--navy); letter-spacing: 6px; }
    .eid-badge { font-size: 1rem; color: var(--white); background: var(--gold); padding: 6px 25px; border-radius: 50px; display: inline-block; }

    .wheel-container {
      position: relative;
      width: clamp(320px, 90vw, 500px);
      height: clamp(320px, 90vw, 500px);
      margin-bottom: 30px;
    }

    /* السهم العلوي */
    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 40px solid var(--navy);
      z-index: 100;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    }

    .wheel-outer {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 12px solid white;
      box-shadow: 0 15px 50px rgba(26, 30, 77, 0.15);
      position: relative;
      overflow: hidden;
      transition: transform 6s cubic-bezier(0.15, 0, 0.1, 1);
      background: #eee;
    }

    /* كل قسم يحتوي على النص والخلفية */
    .slice {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      transform-origin: 50% 50%;
    }

    .slice-content {
      margin-top: 40px; /* مسافة النص من الحافة */
      text-align: center;
      z-index: 5;
      width: 80px;
      word-wrap: break-word;
    }

    .slice-content span {
      display: inline-block;
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--navy);
      line-height: 1.3;
      padding: 0 5px;
    }

    /* رسم الخلفيات الملونة */
    .slice-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      clip-path: polygon(50% 50%, 35% 0%, 65% 0%); /* رسم المثلث */
      background: var(--white);
    }

    .center-logo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
      background: white;
      border: 4px solid var(--gold);
      border-radius: 50%;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .logo-img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; }

    .btn-spin {
      background: var(--navy);
      color: white;
      border: none;
      padding: 16px 70px;
      font-size: 1.3rem;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 10px 30px rgba(26, 30, 77, 0.2);
    }

    .btn-spin:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(26, 30, 77, 0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(8px);
    }

    .winner-card {
      background: white;
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      max-width: 400px;
      width: 85%;
      border-top: 8px solid var(--gold);
      animation: popIn 0.5s ease-out;
    }

    @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .winner-name { font-size: 2.2rem; font-weight: 800; color: var(--navy); margin: 20px 0; line-height: 1.3; }
    .close-btn { background: var(--navy); color: white; border: none; padding: 12px 35px; border-radius: 12px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>

  <header class="header-section">
    <h1 class="brand-title">MANDOLIN</h1>
    <div class="eid-badge">عيدية ماندولين الاستثنائية 🎊</div>
  </header>

  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel-outer" id="wheel"></div>
    <div class="center-logo">
      <img src="لوقو ماندولين_page-0001.jpg" alt="Mandolin" class="logo-img">
    </div>
  </div>

  <button class="btn-spin" id="spinBtn" onclick="spinWheel()">اسحب عيديتك! 🎁</button>

  <div class="modal" id="resultModal">
    <div class="winner-card">
      <h2>🎊 يا حيّ الله هالطّلة 🎊</h2>
      <p style="margin-top:10px">عيديّـتك من ماندولين هي:</p>
      <div class="winner-name" id="winnerLabel"></div>
      <button class="close-btn" onclick="closeModal()">استمتع بالعيد معنا!</button>
    </div>
  </div>

  <script>
    const eidGifts = [
      "قهوة اليوم ☕️", "العيد شوفتك ✨", "ماندولين عيدي 🤳", 
      "كركديه بارد 🍷", "ابتسم للعيد! 😊", "العيدية راحت 😅", 
      "حظ أوفر 🎯", "عيدية ضاعت 🚶‍♂️", "سلامنا بس 🤝", 
      "عيدية واسطة 😜", "وجودك عيدية 😊"
    ];

    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const totalItems = eidGifts.length;
    const anglePerSlice = 360 / totalItems;

    function init() {
      eidGifts.forEach((gift, i) => {
        const sliceRotation = i * anglePerSlice;
        
        // إنشاء حاوية القسم
        const slice = document.createElement('div');
        slice.className = 'slice';
        slice.style.transform = `rotate(${sliceRotation}deg)`;

        // الخلفية الملونة (مثلث)
        const bg = document.createElement('div');
        bg.className = 'slice-bg';
        bg.style.background = i % 2 === 0 ? '#ffffff' : '#f8f4ef';
        
        // النص
        const content = document.createElement('div');
        content.className = 'slice-content';
        content.innerHTML = `<span>${gift}</span>`;

        slice.appendChild(bg);
        slice.appendChild(content);
        wheel.appendChild(slice);
      });
    }

    let currentRotation = 0;

    function spinWheel() {
      if (spinBtn.disabled) return;
      spinBtn.disabled = true;

      const randomSpin = 1800 + Math.floor(Math.random() * 360); // 5 لفات على الأقل
      currentRotation += randomSpin;
      
      wheel.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        const actualDeg = currentRotation % 360;
        // السهم في الأعلى (الزاوية 0)
        const winnerIndex = Math.floor(((360 - actualDeg) % 360) / anglePerSlice);
        
        document.getElementById('winnerLabel').innerText = eidGifts[winnerIndex];
        document.getElementById('resultModal').style.display = 'flex';
        spinBtn.disabled = false;
      }, 6200);
    }

    function closeModal() {
      document.getElementById('resultModal').style.display = 'none';
    }

    init();
  </script>
</body>
</html>
